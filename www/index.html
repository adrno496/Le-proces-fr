<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>The Judge</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1" />
  <meta name="theme-color" content="#1a1410" />
  <meta name="description" content="The Judge — realistic court game: verdicts, pleadings, legal codex. 100% local." />

  <!-- Favicon (multi-formats) -->
  <link rel="icon" type="image/x-icon" href="icons/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="icons/favicon-48.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="icons/favicon-96.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/favicon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/favicon-512.png" />

  <!-- iOS / Apple touch -->
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="The Judge" />

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.webmanifest" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main id="panel-root" class="app-root"></main>
  <nav id="bottom-nav" class="bottom-nav"></nav>
  <div id="toast-root" class="toast-root"></div>
  <script type="module" src="js/app.js"></script>
  <script>
    // Register service worker for offline + update notifications
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").then(reg => {
          // Listen for new versions
          reg.addEventListener("updatefound", () => {
            const newSW = reg.installing;
            if (!newSW) return;
            newSW.addEventListener("statechange", () => {
              if (newSW.state === "installed" && navigator.serviceWorker.controller) {
                // New version available
                window.dispatchEvent(new CustomEvent("sw-update-available", { detail: { sw: newSW } }));
              }
            });
          });
        }).catch(err => console.warn("[sw] register failed:", err));
      });
    }
  </script>
</body>
</html>
